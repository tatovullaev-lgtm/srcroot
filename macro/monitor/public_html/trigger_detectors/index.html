        <script type='module'>
            import { draw, redraw, httpRequest, resize, cleanup} from 'jsroot';
            import * as bm from 'bmtools';
            var loco = window.location;
            var path0 = /*loco.protocol + "//" + loco.hostname + */"../root.app/";
            var path = path0 + "Triggers/";
            var runPath = "../root.app/CurRun/root.json";
            var refPath = "../root.app/refTable/root.json";
            var refList;
//            window.addEventListener("load", () => {
//                createTable();
//                  });
            function createTable() {
                sessionStorage.clear();
                bm.setRunInfo(runPath);
                drawInfo();
            }
            async function updateRunId() {
                let obj = await httpRequest(runPath, 'object');
                    var info = obj;//JSON.parse(obj);
                    if (info.arr.length > 0) {
                        var runInfo = info.arr[0];
                        var runID = runInfo.i_run_number;
                        var storedRunId = sessionStorage.getItem('runID');
                        if ((storedRunId === null) || (storedRunId == runID))
                            return;
                        sessionStorage.setItem('runID', runID);
                        cleanCanvases();
                    }
            }
            function ResetTrigHist() {
                var filename = path + "Reset/cmd.json";
                var xhr = new XMLHttpRequest();
                xhr.open("POST", filename, true);
                xhr.withCredentials = true;
                xhr.send();
            }
            function ChangeBDChannel() {
                var iChannel = document.getElementById("BDChannelText").value;
                var filename = path + "ChangeBDChannel/cmd.json";
                filename = filename + "?" + "arg1=" + iChannel;
                var xhr = new XMLHttpRequest();
                xhr.open("POST", filename, true);
                xhr.withCredentials = true;
                xhr.send();
            }
            function drawInfo() {
                setTimeout(drawInfo, 5000);
                updateRunId();
                redrawCanvases();
                bm.FillRefTable(path0 + "refTable" + "/root.json", "refTable");
                //var refPath = path0 + "refList" + "/root.json";
                //FillRefSelector(refPath, "refSelector");
            }
            function redrawCanvases() {
                bm.Redraw2Div(path0 + "infoCanvas" + "/root.json.gz?compact=3", "infoC");
//                bm.Redraw2Div(path + "TriggersCanvasTimesByChannel" + "/root.json.gz?compact=3", "timeChannelTableC");
                bm.Redraw2Div(path + "Triggers_Trig_States_2D" + "/root.json.gz?compact=3", "trigStates2D");
//                filename = path + "TriggersCanvasTimes" + "/root.json.gz?compact=3";
//                JSROOT.NewHttpRequest(filename, 'object', function (obj) {
//                    JSROOT.redraw("timeTableC", obj, "");
//                }).send(null);
//                filename = path + "Triggers_BD_Grid" + "/root.json.gz?compact=3";
//                JSROOT.NewHttpRequest(filename, 'object', function (obj) {
//                    JSROOT.redraw("timeTableC", obj, "");
//                }).send(null);
//                filename = path + "Triggers_ND_Grid" + "/root.json.gz?compact=3";
//                JSROOT.NewHttpRequest(filename, 'object', function (obj) {
//                    JSROOT.redraw("timeTableC", obj, "");
//                }).send(null);
            }
            function cleanCanvases() {
                cleanup('infoC');
                cleanup('srcTableC');
                var sel = document.getElementById('refTable');
                sel.innerHTML = "";
            }
            function SetRefRun() {
                var runName = document.getElementById("refInput").value;
                var cmd = path + "SetRefRun/cmd.json";
                cmd = cmd + "?" + "arg1=" + runName;
                var xhr = new XMLHttpRequest();
                xhr.open("POST", cmd, true);
                xhr.withCredentials = true;
                xhr.send();
                cleanup("timeTableC");
            }
            window.createTable = createTable;
            window.SetRefRun = SetRefRun;
            window.redrawCanvases = redrawCanvases;
            window.makeSelection = bm.makeSelection;
            const globalFuncs = {
                createTable, cleanCanvases,redrawCanvases, SetRefRun, ResetTrigHist}
            Object.assign(window, globalFuncs);
        </script>
    </head>
