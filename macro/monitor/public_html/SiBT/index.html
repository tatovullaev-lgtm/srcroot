<!DOCTYPE html>
<html>
    <head>
        <title>SiBT detectors</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--#include virtual="../include_digi.html" -->
        <script type='module'>
            import { draw, redraw, httpRequest, resize, cleanup} from 'jsroot';
            import * as bm from 'bmtools';
            var loco = window.location;
            var path0 = loco.protocol + "//" + loco.hostname + "/root.app/";
            var path = path0 + "SiBT/";
            var runPath = "../root.app/CurRun/root.json";
            var refPath = "../root.app/refTable/root.json";
//            window.addEventListener("load", () => {
//                createTable();
//                  });
            function createTable() {
                sessionStorage.clear();
                bm.setRunInfo(runPath);
                drawInfo();
            }
            async function updateRunId() {
                let obj = await httpRequest(runPath, 'object');
                    var info = obj;//JSON.parse(obj);
                    if (info.arr.length > 0) {
                        var runInfo = info.arr[0];
                        var runID = runInfo.i_run_number;
                        var storedRunId = sessionStorage.getItem('runID');
                        if ((storedRunId === null) || (storedRunId == runID))
                            return;
                        sessionStorage.setItem('runID', runID);
                        cleanCanvases();
                    }
            }
            function Reset() {
                var filename = path + "Reset/cmd.json";
                var xhr = new XMLHttpRequest();
                xhr.open("POST", filename, true);
                xhr.withCredentials = true;
                xhr.send();
            }
            function reloadIFrame() {
                var tc = document.getElementById("trig_counter");
                var temp = tc.src;
                tc.src = "";
                tc.src = temp;
            }
            function drawInfo() {
                setTimeout(drawInfo, 3000);
//                alert("draw");
                updateRunId();
                redrawCanvases();
                bm.FillRefTable(path0 + "refTable" + "/root.json", "refTable");
            }
            async function redrawCanvases() {
                bm.Redraw2Div(path0 + "infoCanvas" + "/root.json", "infoC");
                bm.Redraw2Div(path + "SiBTCanvas" + "/root.json", "occupancy");
                bm.Redraw2Div(path + "SiBTSignalCanvas" + "/root.json", "correlations");
                bm.Redraw2Div(path + "SiBTStripSignalCanvas" + "/root.json", "stripSignal");
                bm.Redraw2Div(path + "SiBTStripNoiseCanvas" + "/root.json", "stripNoise");
                bm.Redraw2Div(path + "SiBTChipSignalCanvas" + "/root.json", "chipSignal");
            }
            function cleanCanvases() {
                cleanup("infoC");
                cleanup("occupancy");
                cleanup("correlations");
                cleanup("stripSignal");
                cleanup("stripNoise");
                cleanup("chipSignal");
                var sel = document.getElementById("refTable");
                sel.innerHTML = "";
            }
            function SetRefRun() {
                var runName = document.getElementById("refInput").value;
                var cmd = path + "SetRefRun/cmd.json";
                cmd = cmd + "?" + "arg1=" + runName;
                var xhr = new XMLHttpRequest();
                xhr.open("POST", cmd, true);
                xhr.withCredentials = true;
                xhr.send();
                cleanup("occupancy");
            }
            window.createTable = createTable;
            window.SetRefRun = SetRefRun;
            window.redrawCanvases = redrawCanvases;
            window.Reset = Reset;
            window.makeSelection = bm.makeSelection;
        </script>
    </head>
    <body onload="createTable()">
    <!--<body onload="createTable()">-->
        <!--#include virtual="../menu.html" -->
        <div id="total_counter" align="center">
            <h1>BM@N SiBT</h1>  
            <!--<iframe id="infoCan" ></iframe>--> 
        </div>
        <div align="center">
            <div id="infoC" style="width: 90vw;height: 15vw;"> </div>
        </div>

        <table>
            <tr>
            <tb>
                <button onclick="Reset()">
                    <h1 style="color:red;">Reset</h1>
                </button>
            </tb>
        </tr>
        <tr>
        <tb>
            <input type="text" name="refInput" id="refInput" list="refSelector">
            <datalist id="refSelector" autocomplete="on"></datalist>
        </tb>
        <tb>
            <button onclick="SetRefRun()"> 
                Select Reference Run
            </button>
        </tb>
        <tb>
            <select class="styleRefTable" id="refTable" onchange="makeSelection()">
        </tb>

    </tr>
</table>

<div class="tabs">
    <input type="radio" name="inset" value="" id="tab_1" onclick="redrawCanvases()" checked>
    <label for="tab_1">Occupancy</label>

    <input type="radio" name="inset" value="" id="tab_2" onclick="redrawCanvases()">
    <label for="tab_2">Correlations</label>

    <input type="radio" name="inset" value="" id="tab_3" onclick="redrawCanvases()">
    <label for="tab_3">Signals of strips</label>

    <input type="radio" name="inset" value="" id="tab_4" onclick="redrawCanvases()">
    <label for="tab_4">Noises</label>

    <input type="radio" name="inset" value="" id="tab_5" onclick="redrawCanvases()">
    <label for="tab_5">Signals for each chip</label>

    <div id="txt_1">
        <div align="center">
            <div id="occupancy" style="width: 90vw;height: 100vw;"> </div>
        </div>
    </div>
    <div id="txt_2">
        <div align="center">
            <div id="correlations" style="width: 90vw;height: 100vw;"> </div>
        </div>
    </div>
    <div id="txt_3">
        <div align="center">
            <div id="stripSignal" style="width: 90vw;height: 100vw;"> </div>
        </div>
</div>
    <div id="txt_4">
        <div align="center">
            <div id="stripNoise" style="width: 90vw;height: 100vw;"> </div>
        </div>
</div>
    <div id="txt_5">
        <div align="center">
            <div id="chipSignal" style="width: 90vw;height: 100vw;"> </div>
        </div>
</div>

</div>

</body>
</html>
