        console.log("path:" + path)
        console.log("runPath:" + runPath)
        console.log("refPath:" + refPath)
        function ResetHist() {
            var filename = path_cmd + "/Reset/cmd.json";
            var xhr = new XMLHttpRequest();
            xhr.open("POST", filename, true);
            xhr.withCredentials = true;
            xhr.send();
        }
        function ResetSiBT() {
            var filename = path_cmd + "/ResetSiBT/cmd.json";
            var xhr = new XMLHttpRequest();
            xhr.open("POST", filename, true);
            xhr.withCredentials = true;
            xhr.send();
        }
        //            window.onload = setInterval("reloadIFrame();", 2000);
        //body.onload = createTable();
        function createTable() {
            sessionStorage.clear();
           // bm.setRunInfo(runPath);
            drawInfo();
            loadJSON();
        }
        function drawInfo() {
            setTimeout(drawInfo, 5000);
            redrawCanvases();
            //                FillRefTable(path0 + "refTable" + "/root.json", "refTable");
            //var refPath = path0 + "refList" + "/root.json";
            //FillRefSelector(refPath, "refSelector");
        }
        function redrawCanvases() {
            var filename = path0 + "infoCanvas" + "/root.json";
        }
        function cleanCanvases() {
            //                JSROOT.cleanup("infoC");
            JSROOT.cleanup("GlobalC");
            var sel = document.getElementById("refTable");
            sel.innerHTML = "";
        }
        function SetRefRun() {
            var runName = document.getElementById("refInput").value;
            var cmd = path + "SetRefRun/cmd.json";
            cmd = cmd + "?" + "arg1=" + runName;
            var xhr = new XMLHttpRequest();
            xhr.open("POST", cmd, true);
            xhr.withCredentials = true;
            xhr.onreadystatechange = function () {
                //                    if (xhr.readyState === 4) {
                var response = JSON.parse(xmlhttp.responseText);
                alert(
                    "ready state: " + xhr.readyState +
                    "status : " + xhr.status +
                    "response: " + response);
                //                    }
            }
            xhr.send();
            JSROOT.cleanup("GlobalC");
        }
        function formatJSON() {
            const txt = document.getElementById('jsonInput').value;
            try {
                const obj = JSON.parse(txt);
                document.getElementById('jsonInput').value = JSON.stringify(obj, null, 2);
                showMessage('Formatted successfully.', 'green');
                return obj;
            } catch (e) {
                showMessage('Invalid JSON: ' + e.message, 'red');
            }
        }

        function validateJSON() {
            const txt = document.getElementById('jsonInput').value;
            try {
                JSON.parse(txt);
                showMessage('Valid JSON.', 'green');
            } catch (e) {
                showMessage('Invalid JSON: ' + e.message, 'red');
            }
        }

        function saveJSON() {
            const txt = document.getElementById('jsonInput').value;
            try {
                formatJSON();
                //alert('formatJSON');
                //JSON.parse(txt);
                var cmd = custom_path + "custom_qa_title/SaveConfig/cmd.json";
                const literal = '""' + btoa(txt) + '""';
                cmd = cmd + "?" + "arg1=" + literal;
                fetch(cmd,
                    {
                        method: 'POST'
                        , headers: {
                            'Content-Type': 'application/json'
                        }
                        // ,body: literal
                    }
                )
                    .then(response => {
                        if (!response.ok) throw new Error(response.status);
                        return response.json();
                    })
                    .then(data => console.log('Success:', data))
                    .catch(err => console.error('Error:', err));
                showMessage('JSON sent to server.', 'green');
            } catch (e) {
                showMessage('Invalid JSON: ' + e.message, 'red');
            }
        }

        function loadDefaultJSON() {
            //alert("loadDefaultJSON")
            var cmd = custom_path + "custom_qa/exe.json?method=LoadDefaultConfig";
            var json = fetch(cmd,
                {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                }
            )
                .then(response => {
                    if (!response.ok) throw new Error(response.status);
                    return response.json();
                })
                .then(data => {
                    console.log('Success:', data);
                    document.getElementById('jsonInput').value = data.fString;

                }
                )
                .catch(err => console.error('Error:', err));
        }

        function loadJSON() {
            //alert("loadJSON")
            var cmd = custom_path + "custom_qa/exe.json?method=FetchConfig";
            var json = fetch(cmd,
                {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                }
            )
                .then(response => {
                    if (!response.ok) throw new Error(response.status);
                    return response.json();
                })
                .then(data => {
                    console.log('Success:', data);
                    document.getElementById('jsonInput').value = data.fString;

                }
                )
                .catch(err => console.error('Error:', err));
        }

        function reset() {
            //alert("reset")
            var cmd = custom_path + "custom_qa_title/Reset/cmd.json";
            var json = fetch(cmd,
                {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                }
            )
                .then(response => {
                    if (!response.ok) throw new Error(response.status);
                    return response.json();
                })
                .then(data => {
                    console.log('Success:', data);
                }
                )
                .catch(err => console.error('Error:', err));
        }

        function showMessage(msg, color) {
            const out = document.getElementById('status');
            out.textContent = msg;
            out.style.color = color;
        }
           // window.createTable = createTable;
            window.SetRefRun = SetRefRun;
            window.redrawCanvases = redrawCanvases;
            window.makeSelection = bm.makeSelection;
            const globalFuncs = {
                createTable, cleanCanvases, SetRefRun, redrawCanvases,
                formatJSON, validateJSON, saveJSON, loadDefaultJSON, loadJSON, reset}
            Object.assign(window, globalFuncs);
    </script>
